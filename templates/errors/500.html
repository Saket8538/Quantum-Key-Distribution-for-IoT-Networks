{% extends "base.html" %}
{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="py-5">
                <h1 class="display-1 mb-0" style="font-size: 8rem; background: linear-gradient(135deg, #ff6b6b, #f093fb); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    500
                </h1>
                <h2 class="mb-4">Internal Server Error</h2>
                <p class="text-secondary mb-4">
                    Something went wrong on our end.<br>
                    The quantum computer encountered a decoherence event. Please try again.
                </p>
                <a href="{{ url_for('index') }}" class="btn btn-quantum me-2">
                    <i class="fas fa-home me-2"></i>Go Home
                </a>
                <a href="javascript:location.reload()" class="btn btn-outline-info">
                    <i class="fas fa-redo me-2"></i>Try Again
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
