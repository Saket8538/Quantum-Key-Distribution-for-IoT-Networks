{% extends "base.html" %}
{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="py-5">
                <h1 class="display-1 mb-0" style="font-size: 8rem; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    404
                </h1>
                <h2 class="mb-4">Page Not Found</h2>
                <p class="text-secondary mb-4">
                    The page you're looking for doesn't exist or has been moved.<br>
                    Perhaps the quantum state collapsed before reaching its destination.
                </p>
                <a href="{{ url_for('index') }}" class="btn btn-quantum me-2">
                    <i class="fas fa-home me-2"></i>Go Home
                </a>
                <a href="javascript:history.back()" class="btn btn-outline-info">
                    <i class="fas fa-arrow-left me-2"></i>Go Back
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
