{% extends "base.html" %}

{% block title %}{{ title }} - Quantum IoT Security{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card-quantum text-center py-5">
                <div class="card-body">
                    <div class="mb-4">
                        <i class="fas fa-exclamation-triangle fa-5x" style="color: #f093fb;"></i>
                    </div>
                    <h2 class="mb-3">{{ title }}</h2>
                    <p class="text-secondary mb-4">{{ message }}</p>
                    <a href="{{ url_for('index') }}" class="btn btn-quantum">
                        <i class="fas fa-home me-2"></i>Go to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
